name: nutrimove
description: "NutriMove — Smart Nutrition Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Routing
  go_router: ^14.8.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.70.2

  # Local Storage
  shared_preferences: ^2.3.5

  # Date/Number Formatting
  intl: ^0.20.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  camera: ^0.12.0+1
  image_picker: ^1.2.2
  google_generative_ai: ^0.4.7
  google_sign_in: ^6.2.1
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/nutrimove_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/nutrimove_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
